name: "Prisoner's Dilemma (persona-driven)"
description: |
  Persona-driven variant of the prisoner's dilemma. A single neutral "player"
  role is shared by all agents; behavioral and demographic variation comes
  from inline persona payloads declared per-agent below.

prompt_partials:
  - name: "game_description"
    content: |
      You are playing the role of a criminal who has been arrested and is being interrogated by the police. You had a partner in the crime, who is also being interrogated.

      In each round, you will need to choose between:
      - **Cooperate**: Remain silent (don't betray your partner)
      - **Defect**: Testify against your partner

      Your payoffs depend on both your choice and your partner's choice:

      - Both cooperate: You get 3, opponent gets 3
      - You cooperate, opponent defects: You get 0, opponent gets 5
      - You defect, opponent cooperates: You get 5, opponent gets 0
      - Both defect: You get 1, opponent gets 1

  - name: "game_instructions"
    content: |
      ## Instructions

      Based on the current game state and the kind of person you are, choose whether to **cooperate** or **defect** in this round.

      Provide your choice as a JSON object with the following fields:
      - `gameId`: The ID of the game
      - `type`: The type of message, which should be "choice"
      - `choice`: The choice you made — either "COOPERATE" or "DEFECT"

      Example:
      ```
      {
          "gameId": <game_id>,
          "type": "choice",
          "choice": "COOPERATE"
      }
      ```

      Respond with only the JSON object. Start with `{` and end with `}`.

  - name: "game_history"
    content: |
      {% if public_information.history %}
      Previous rounds:
      {% for round in public_information.history %}
      Round {{round.round}}: You chose **{{ round.my_choice }}**, opponent chose **{{ round.opponent_choice }}**. You earned {{ round.my_payoff }} points.
      {% endfor %}
      {% else %}
      This is the first round.
      {% endif %}


agent_roles:
  - role_id: 1
    name: "player"
    llm_type: "ChatOpenAI"
    llm_params:
      model_name: "gpt-5.4-mini"
    prompts:
      - system: |
          {% include "_partials/game_description.jinja2" %}

      - user: |
          {% include "_partials/game_history.jinja2" %}
          {% include "_partials/game_instructions.jinja2" %}


agents:
  - id: 1
    role_id: 1
    persona:
      id: "maria-cooperative"
      demographics:
        age: 37
        country: ES
        occupation: social-worker
      traits:
        cooperativeness: high
        reciprocity: high
      bio: You believe most people are trying their best, and you give them a fair chance.

  - id: 2
    role_id: 1
    persona:
      id: "marcus-strategic"
      demographics:
        age: 44
        country: US
        occupation: hedge-fund-analyst
      traits:
        cooperativeness: low
      bio: You evaluate every situation by expected value. Sentimentality is expensive.


state:
  meta_information:
    - name: "game_id"
      type: "int"
      default: 0
      exclude_from_mapping: true
    - name: "player_name"
      type: "str"
      optional: true
    - name: "player_number"
      type: "int"
      optional: true
    - name: "players"
      type: "list"
      default_factory: "list"
    - name: "phase"
      type: "int"
      default: 0
      event_key: "round"
    - name: "total_rounds"
      type: "int"
      default: 5
  private_information:
    - name: "total_score"
      type: "int"
      default: 0
  public_information:
    - name: "history"
      type: "list"
      default_factory: "list"

manager:
  type: "TurnBasedPhaseManager"

runner:
  game_id: 0
  type: "TurnBasedGameRunner"
  hostname: "localhost"
  port: 8765
  path: "wss"
  log_level: "DEBUG"
  phase_transition_event: "round-started"
  phase_identifier_key: "round"
